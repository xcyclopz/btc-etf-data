name: Update ETF flows

on:
  schedule:
    - cron: "30 11 * * *"
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scrape Farside
        run: node scrape.js

      - name: Commit updated data
        run: |
          git config user.name "etf-bot"
          git config user.email "actions@github.com"
          git add data/etf-flows.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update ETF flows"
            git push
          fi
